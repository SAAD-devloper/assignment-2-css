
<!DOCTYPE html>
<html lang="en">
<head>
<title>Login Card</title>

<style>

            *{
             margin:0;
             padding:0;
             box-sizing:border-box;
             font-family:Arial,sans-serif;
       }
 
               body{
                   background:#111827;
        }

/*================ Navigation ================*/

           nav{
               width:100%;
               display:flex;
               justify-content:space-between;
               align-items:center;
               background:#000;
               padding:18px 60px;
       }

               .logo{
                    color:#fff;
                    font-size:30px;
                   font-weight:bold;
       }

             nav ul{
                    display:flex;
                    list-style:none;
                    gap:30px;
       }

        nav ul li a{
                  text-decoration:none;
                  color:white;
                  font-size:18px;
                  transition:.3s;
        }
 
           nav ul li a:hover{
                            color:#00d9ff;
        }

/*================ Container ================*/

           .container{
                     display:flex;
                     justify-content:center;
                      align-items:center;
                     padding:70px 20px;
                  }

/*================ Card ================*/

            .card{

                       width:280px;
                       background:rgba(255,255,255,.12);
                       backdrop-filter:blur(10px);
                       border-radius:20px;
                       overflow:hidden;
                       text-align:center;
                       box-shadow:0 0 15px rgba(0,0,0,.5);
                       transition:.4s;

    }

        .card:hover{
 
                  transform:translateY(-10px);

    }

           .card img{

                     width:100%;
                     height:180px;
                     object-fit:cover;

    }

         .card-content{

                       padding:20px;

    }

       .card-content h3{

                       color:#fff;
                       margin-bottom:15px;

     }

         .card-content p{

                         color:#ddd;
                         line-height:24px;
                         margin-bottom:20px;

      }

            .card button{

                          width:100%;
                          padding:12px;
                          border:none;
                          border-radius:30px;
                          background:#000;
                          color:#fff;           
                          font-size:16px;
                          cursor:pointer;
                          transition:.3s;

       }

          .card button:hover{

                            background:#ff0077;

       }

/*================ Responsive ================*/

                  @media(max-width:768px){

                  nav{

                            flex-direction:column;
                            gap:15px;
                            padding:20px;

        }

                 nav ul{

                          flex-wrap:wrap;
                          justify-content:center;

        }



</style>

</head>
<body>

<!-- Navigation -->

<nav>

<div class="logo">Assignment 02</div>

<ul>
    <li><a href="index.html">Task 1</a></li>
    <li><a href="picture.html">Task 2</a></li>
    <li><a href="about.html">Task 3</a></li>
    <li><a href="contact.html">Task 4</a></li>
</ul>

</nav>

<!-- Card -->

<div class="container">

<div class="card">

<img src="image3.jpg" alt="Ocean">

<div class="card-content">

<h3>Login to Continue</h3>

<p>
Access your account securely and continue your journey with us.
</p>

<button>Login</button>

</div>

</div>

</div>

</body>
</html>
